services:
  bot:
    build:
      context: .
    container_name: fakturabot
    restart: unless-stopped
    env_file:
      - .env
    environment:
      DB_PATH: /bot/data/storage/fakturabot.db
      STORAGE_DIR: /bot/data/storage
    volumes:
      - ./data/storage:/bot/data/storage
      - ./logs:/bot/logs
    working_dir: /app
    command: python -m bot.main
